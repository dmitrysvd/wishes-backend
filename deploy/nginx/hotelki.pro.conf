# nginx-конфиг для hotelki.pro — трекаемый источник правды.
# Применяется вручную на сервере (см. deploy/nginx/README.md). Не контейнеризован:
# nginx живёт на хосте, терминирует TLS (Certbot). Строки «managed by Certbot» —
# его, не трогаем.

# UA-детект краулеров соцсетей. Для них расшаренная ссылка /user отдаёт серверный
# OG-HTML с бэкенда (превью-карточка в чате); живые юзеры идут в Flutter SPA.
map $http_user_agent $is_social_crawler {
  default 0;
  '~*(Telegrambot|vkShare|vkontakte|facebookexternalhit|facebookcatalog|WhatsApp|Twitterbot|Discordbot|Slackbot|LinkedInBot|Pinterest|redditbot|Googlebot|Applebot|SkypeUriPreview|TelegramBot)' 1;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream app_server {
  server localhost:8000;
}

server {
  client_max_body_size 4G;
  include /etc/nginx/snippets/git-http.conf;
  server_name hotelki.pro;

  location /api/v1/ {
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_redirect off;
    proxy_buffering off;
    proxy_pass http://app_server;
  }

  # вебсокеты
  location /api/v1/ws/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass http://app_server;
  }

  # OG-превью deep link'а вишлиста. Точный матч /user перехватывает оба класса
  # запросов; краулер → серверный OG-HTML с бэкенда (/og/user), живой юзер → SPA.
  # Идиома error_page+named-location (а не proxy_pass внутри if) — чтобы развилка
  # была надёжной. $is_args$args сохраняют ?userId=... из ссылки.
  location = /user {
    if ($is_social_crawler) {
      return 418;
    }
    error_page 418 = @og_preview;

    root /data/www;
    try_files /index.html =404;
  }

  location @og_preview {
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://app_server/og/user$is_args$args;
  }

  # flutter
  location / {
    alias /data/www/;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  location /static {
    root /data;
  }

  location /media {
    root /data;

    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
  }

  location /.well-known {
    root /data;
  }

  listen 443 ssl; # managed by Certbot
  ssl_certificate /etc/letsencrypt/live/hotelki.pro/fullchain.pem; # managed by Certbot
  ssl_certificate_key /etc/letsencrypt/live/hotelki.pro/privkey.pem; # managed by Certbot
  include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
  if ($host = hotelki.pro) {
    return 301 https://$host$request_uri;
  } # managed by Certbot

  server_name hotelki.pro;
  listen 80;
  return 404; # managed by Certbot
}
