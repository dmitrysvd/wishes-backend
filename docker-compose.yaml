services:
  app:
    image: dmitrysvd1/wishes-app:latest
    # --no-control-socket: убирает фоновый поток control-socket gunicorn 25.x.
    # Иначе fork воркера может произойти, пока этот поток держит лок stdout, и
    # воркер навсегда виснет в logging при старте (дедлок fork + lock).
    command: >
      uv run gunicorn
        --bind 0.0.0.0:8000
        --worker-class uvicorn.workers.UvicornWorker
        --workers 1
        --no-control-socket
        --forwarded-allow-ips='*'
        --chdir /app
        --access-logfile -
        --error-logfile -
        app.main:app
    volumes:
      - ./static:/app/static:ro
      - /data/media:/media
      - ./firebase-adminsdk.json:/firebase-adminsdk.json:ro
    ports:
      - 8000:8000
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    restart: always
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  scheduler:
    image: dmitrysvd1/wishes-app:latest
    command: uv run python -m app.scheduler
    volumes:
      - ./static:/app/static:ro
      - /data/media:/media
      - ./firebase-adminsdk.json:/firebase-adminsdk.json:ro
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    restart: always

  db:
    image: postgres:18
    container_name: wishes-db
    restart: always
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
    ports:
      - 5432:5432
    env_file: .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/

volumes:
  postgres_data:
