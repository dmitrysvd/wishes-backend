services:
  app:
    image: dmitrysvd1/wishes-app:latest
    # --no-control-socket: убирает фоновый поток control-socket gunicorn 25.x.
    # Иначе fork воркера может произойти, пока этот поток держит лок stdout, и
    # воркер навсегда виснет в logging при старте (дедлок fork + lock).
    command: >
      uv run gunicorn
        --bind 0.0.0.0:8000
        --worker-class uvicorn.workers.UvicornWorker
        --workers 1
        --max-requests 500
        --max-requests-jitter 50
        --no-control-socket
        --forwarded-allow-ips='*'
        --chdir /app
        --access-logfile -
        --error-logfile -
        app.main:app
    volumes:
      - ./static:/app/static:ro
      - /data/media:/media
      - ./firebase-adminsdk.json:/firebase-adminsdk.json:ro
    # Только localhost: наружу отдаёт nginx (TLS), он же ходит на localhost:8000.
    ports:
      - 127.0.0.1:8000:8000
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    restart: always
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  scheduler:
    image: dmitrysvd1/wishes-app:latest
    command: uv run python -m app.scheduler
    volumes:
      - ./static:/app/static:ro
      - /data/media:/media
      - ./firebase-adminsdk.json:/firebase-adminsdk.json:ro
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    restart: always
    # Здоров, если heartbeat обновлялся в последние 120с (every_minute бьёт раз в минуту).
    healthcheck:
      test: [ "CMD", "python", "-c", "import os,time,sys; f='/tmp/scheduler_heartbeat'; sys.exit(0 if os.path.exists(f) and time.time()-os.path.getmtime(f) < 120 else 1)" ]
      interval: 60s
      timeout: 5s
      retries: 2
      start_period: 90s

  db:
    image: postgres:18
    container_name: wishes-db
    restart: always
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
    # Только localhost: для psql/бэкапов с хоста. Наружу Postgres не публикуем.
    ports:
      - 127.0.0.1:5432:5432
    env_file: .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/

volumes:
  postgres_data:
